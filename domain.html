<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Domain — Ascension</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <div class="page-head">
    <a class="back-btn" href="domains.html">‹</a>
    <h1 id="domainName">Domain</h1>
  </div>

  <div style="padding:16px 20px 0;">
    <p id="domainOverview" style="font-size:13.5px; color:var(--text-dim); line-height:1.6;"></p>
    <div style="margin-top:14px; padding:14px 16px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-m);">
      <div class="eyebrow" style="margin-bottom:4px;">What you gain</div>
      <div id="domainGain" style="font-size:13px; color:var(--text);"></div>
    </div>
  </div>

  <div class="section-label"><h2>Subdomains</h2></div>
  <div class="domain-list" id="subdomainList" style="gap:10px;"></div>

  <nav class="nav">
    <a class="nav-item" href="index.html"><span class="ic">◷</span>Today</a>
    <a class="nav-item active" href="domains.html"><span class="ic">⬡</span>Domains</a>
    <a class="nav-item" href="progress.html"><span class="ic">◈</span>Progress</a>
    <a class="nav-item" href="profile.html"><span class="ic">△</span>Profile</a>
  </nav>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const domain = getDomain(params.get('id')) || ASCENSION_DATA.domains[0];

  document.getElementById('domainName').textContent = domain.name;
  document.getElementById('domainOverview').textContent = domain.overview;
  document.getElementById('domainGain').textContent = domain.gain;

  const list = document.getElementById('subdomainList');
  domain.subdomains.forEach(sd => {
    const row = document.createElement('div');
    row.className = 'subdomain-row';
    row.innerHTML = `
      <div class="subdomain-tier-badge">${tierLabel(sd.tier)}</div>
      <div style="flex:1;">
        <div class="subdomain-name">${sd.name}</div>
        <div class="subdomain-why">${sd.why}</div>
      </div>
      <div class="session-chevron">›</div>
    `;
    row.addEventListener('click', () => {
      window.location.href = `subdomain.html?domain=${domain.id}&sub=${sd.id}`;
    });
    list.appendChild(row);
  });
</script>
</body>
</html>
