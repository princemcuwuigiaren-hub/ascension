<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Progress — Ascension</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="mark">Ascen<span>sion</span></div>
    <button class="icon-btn" id="themeToggle">☀</button>
  </div>

  <div class="points-row">
    <div class="points-num"><span id="ptsNum">0</span></div>
    <div class="points-sub"><b id="streakNum">0</b>-day streak<br>Lifetime points</div>
  </div>

  <div class="section-label"><h2>Tier Position by Domain</h2></div>
  <div style="padding:0 20px; display:flex; flex-direction:column; gap:14px;" id="domainTiers"></div>

  <div class="divider"></div>

  <div class="section-label"><h2>Consistency</h2></div>
  <div style="padding:0 20px 20px;">
    <div style="background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-m); padding:18px; text-align:center;">
      <div class="empty-note" style="padding:0;">Session history and streak charts populate here once the engine is wired to real usage data.</div>
    </div>
  </div>

  <nav class="nav">
    <a class="nav-item" href="index.html"><span class="ic">◷</span>Today</a>
    <a class="nav-item" href="domains.html"><span class="ic">⬡</span>Domains</a>
    <a class="nav-item active" href="progress.html"><span class="ic">◈</span>Progress</a>
    <a class="nav-item" href="profile.html"><span class="ic">△</span>Profile</a>
  </nav>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById('ptsNum').textContent = ASCENSION_DATA.totalPoints;
  document.getElementById('streakNum').textContent = ASCENSION_DATA.streak;

  const wrap = document.getElementById('domainTiers');
  ASCENSION_DATA.domains.forEach(d => {
    const block = document.createElement('div');
    block.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
        <div style="font-size:13.5px; font-weight:600; display:flex; align-items:center; gap:8px;"><span style="color:var(--gold);">${d.glyph}</span>${d.name}</div>
      </div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        ${d.subdomains.map(sd => `
          <div style="display:flex; align-items:center; gap:10px;">
            <div style="width:90px; font-size:11px; color:var(--text-dim);">${sd.name}</div>
            <div style="flex:1; display:flex; gap:3px;">
              ${ASCENSION_DATA.tierOrder.map((t,i) => `
                <div style="flex:1; height:5px; border-radius:3px; background:${i <= ASCENSION_DATA.tierOrder.indexOf(sd.tier) ? 'var(--gold)' : 'var(--line)'};"></div>
              `).join('')}
            </div>
            <div style="font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--text-dim); width:52px; text-align:right;">${tierLabel(sd.tier)}</div>
          </div>
        `).join('')}
      </div>
    `;
    wrap.appendChild(block);
  });
</script>
</body>
</html>
