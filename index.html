<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ascension</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="mark">Ascen<span>sion</span></div>
    <button class="icon-btn" id="themeToggle">☀</button>
  </div>

  <!-- Signature: Ascent Bar — today's readiness per domain, skyline style -->
  <div class="ascent-bar" id="ascentBar"></div>

  <div class="points-row">
    <div class="points-num"><span id="ptsNum">0</span></div>
    <div class="points-sub"><b id="streakNum">0</b>-day streak<br>Ascension Points</div>
  </div>

  <div class="section-label">
    <h2>Today's Slate</h2>
    <span class="meta" id="slateMeta"></span>
  </div>

  <div class="chip-row" id="chipRow"></div>

  <div class="slate" id="slate"></div>

  <div class="divider"></div>

  <div class="section-label"><h2>This Week</h2></div>
  <div style="padding:0 20px;" id="weekStrip"></div>

  <nav class="nav">
    <a class="nav-item active" href="index.html"><span class="ic">◷</span>Today</a>
    <a class="nav-item" href="domains.html"><span class="ic">⬡</span>Domains</a>
    <a class="nav-item" href="progress.html"><span class="ic">◈</span>Progress</a>
    <a class="nav-item" href="profile.html"><span class="ic">△</span>Profile</a>
  </nav>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById('ptsNum').textContent = ASCENSION_DATA.totalPoints;
  document.getElementById('streakNum').textContent = ASCENSION_DATA.streak;

  // Ascent Bar
  const bar = document.getElementById('ascentBar');
  ASCENSION_DATA.domains.forEach(d => {
    const r = domainReadinessDemo(d.id);
    const col = document.createElement('div');
    col.className = 'ascent-col' + (r > 0.6 ? ' active' : '');
    col.innerHTML = `
      <div class="ascent-track"><div class="ascent-fill" style="height:${Math.round(r*100)}%"></div></div>
      <div class="ascent-glyph">${d.glyph}</div>
    `;
    bar.appendChild(col);
  });

  // Chips
  const chipRow = document.getElementById('chipRow');
  const chips = ['all', ...ASCENSION_DATA.domains.map(d => d.id)];
  chips.forEach(id => {
    const label = id === 'all' ? 'All' : getDomain(id).name;
    const glyph = id === 'all' ? '⬡' : getDomain(id).glyph;
    const chip = document.createElement('div');
    chip.className = 'chip' + (id === 'all' ? ' active' : '');
    chip.dataset.filter = id;
    chip.innerHTML = `<span>${glyph}</span> ${label}`;
    chip.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderSlate(id);
    });
    chipRow.appendChild(chip);
  });

  function renderSlate(filter){
    const slate = document.getElementById('slate');
    slate.innerHTML = '';
    const items = ASCENSION_DATA.todaySlate.filter(s => filter === 'all' || s.domainId === filter);
    document.getElementById('slateMeta').textContent =
      `${items.filter(i=>i.status==='done').length}/${items.length} done`;

    if(items.length === 0){
      slate.innerHTML = `<div class="empty-note">Nothing here today — the scheduler didn't pick this domain. Check back tomorrow.</div>`;
      return;
    }

    items.forEach(s => {
      const dom = getDomain(s.domainId);
      const card = document.createElement('div');
      card.className = 'session-card' + (s.status === 'done' ? ' done' : '') + (s.status === 'overdue' ? ' overdue' : '');
      card.innerHTML = `
        <div class="session-glyph">${dom.glyph}</div>
        <div class="session-body">
          <div class="session-domain">${dom.name} · ${getDomain(s.domainId).subdomains.find(sd=>sd.id===s.subdomainId)?.name || ''}</div>
          <div class="session-title">${s.title}</div>
          <div class="session-meta"><span>${s.minutes} min</span><span class="dot">+${s.pts} pts</span></div>
        </div>
        <div class="session-chevron">›</div>
      `;
      slate.appendChild(card);
    });
  }
  renderSlate('all');

  // Week strip (placeholder — last 7 days, today highlighted)
  const week = document.getElementById('weekStrip');
  const days = ['Th','Fr','Sa','Su','Mo','Tu','We'];
  const nums = ['25','26','27','28','29','30','1'];
  const doneFlags = [true,true,true,false,true,'today',false];
  const row = document.createElement('div');
  row.style.cssText = 'display:flex; gap:6px;';
  days.forEach((d,i)=>{
    const isToday = doneFlags[i] === 'today';
    const done = doneFlags[i] === true;
    const pill = document.createElement('div');
    pill.style.cssText = `flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; padding:10px 0; border-radius:10px; ${isToday ? 'background:var(--surface); border:1px solid var(--line);' : ''}`;
    pill.innerHTML = `
      <span style="font-size:9px; color:var(--text-dim); letter-spacing:0.06em; text-transform:uppercase;">${d}</span>
      <span style="font-family:'JetBrains Mono',monospace; font-size:13px; color:${isToday ? 'var(--gold-bright)' : (done ? 'var(--gold)' : 'var(--text-dim)')}; font-weight:${isToday?'600':'400'};">${nums[i]}</span>
    `;
    row.appendChild(pill);
  });
  week.appendChild(row);
</script>
</body>
</html>
