<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Profile — Ascension</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="mark">Ascen<span>sion</span></div>
    <button class="icon-btn" id="themeToggle">☀</button>
  </div>

  <div style="padding:24px 20px 0; display:flex; flex-direction:column; align-items:center; gap:10px;">
    <div style="width:76px; height:76px; border-radius:50%; background:var(--surface); border:1px solid var(--line-strong); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:26px; color:var(--gold);">IK</div>
    <div style="font-family:'Fraunces',serif; font-size:16px; font-weight:600;">Idle King</div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--gold);" id="ptsDisplay"></div>
  </div>

  <div class="section-label"><h2>Check-in Preferences</h2></div>
  <div style="padding:0 20px; display:flex; flex-direction:column; gap:8px;" id="checkinPrefs"></div>

  <div class="divider"></div>

  <div class="section-label"><h2>Settings</h2></div>
  <div style="padding:0 20px; display:flex; flex-direction:column; gap:1px; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-m); margin:0 20px; overflow:hidden; width:calc(100% - 40px);">
    <div class="settings-row">Edit profile</div>
    <div class="settings-row">Notification reminders</div>
    <div class="settings-row">Export data</div>
    <div class="settings-row">Reset progress</div>
    <div class="settings-row">About Ascension</div>
  </div>

  <nav class="nav">
    <a class="nav-item" href="index.html"><span class="ic">◷</span>Today</a>
    <a class="nav-item" href="domains.html"><span class="ic">⬡</span>Domains</a>
    <a class="nav-item" href="progress.html"><span class="ic">◈</span>Progress</a>
    <a class="nav-item active" href="profile.html"><span class="ic">△</span>Profile</a>
  </nav>
</div>

<style>
  .settings-row{
    padding:15px 16px; font-size:13.5px; color:var(--text);
    border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center;
  }
  .settings-row:last-child{ border-bottom:none; }
  .settings-row::after{ content:'›'; color:var(--text-dim); }
  .pref-row{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-s);
    padding:12px 14px; display:flex; justify-content:space-between; align-items:center; font-size:12.5px;
  }
  .pref-toggle{
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.04em;
    padding:5px 10px; border-radius:14px; border:1px solid var(--line-strong); color:var(--gold);
    text-transform:uppercase; cursor:pointer;
  }
</style>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  document.getElementById('ptsDisplay').textContent = ASCENSION_DATA.totalPoints + ' pts · ' + ASCENSION_DATA.streak + '-day streak';

  const prefs = document.getElementById('checkinPrefs');
  const demoModes = { physical:'checkin', mind:'checkin', finance:'inferred', skills:'checkin', appearance:'inferred' };
  ASCENSION_DATA.domains.forEach(d => {
    const row = document.createElement('div');
    row.className = 'pref-row';
    const mode = demoModes[d.id];
    row.innerHTML = `
      <span>${d.glyph} ${d.name}</span>
      <span class="pref-toggle">${mode === 'checkin' ? 'Check-in' : 'Inferred'}</span>
    `;
    prefs.appendChild(row);
  });
</script>
</body>
</html>
